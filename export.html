<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🖨️ Print Export - Book Composer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand"><h1>📚 Book Composer</h1></div>
        <div class="navbar-menu">
            <a href="index.html" class="nav-link">🏠 Home</a>
            <a href="reader.html" class="nav-link">📖 Reader</a>
            <a href="export.html" class="nav-link active">🖨️ Print Export</a>
        </div>
        <button class="btn-theme" onclick="toggleTheme()">🌙</button>
    </nav>

    <main class="container export-container">
        <h2>🖨️ Print Export Settings</h2>
        <div class="export-grid">
            <div class="settings-panel">
                <h3>Export Configuration</h3>
                <div class="form-group">
                    <label for="exportSourceFile">📂 Select PDF to Re-format</label>
                    <input type="file" id="exportSourceFile" accept=".pdf" class="form-control" required>
                    <small style="color: var(--text-secondary); display: block; margin-top: 5px;">
                        Upload your A5 book, we'll format it perfectly onto A4 sheets.
                    </small>
                </div>
                <div class="form-group">
                    <label for="paperSize">Target Paper Size</label>
                    <select id="paperSize" onchange="updatePreview()">
                        <option value="A4">A4 (210 × 297 mm) - 2 Pages per sheet</option>
                    </select>
                </div>
                <button class="btn btn-primary btn-large" onclick="exportPDF()">📥 Export Booklet PDF</button>
            </div>
            <div class="preview-panel">
                <h3>📋 Live Preview</h3>
                <div class="preview-box">
                    <div class="preview-content" id="previewContent">
                        <h4 id="previewSize">A4 (210 × 297 mm)</h4>
                        <p><strong>Layout:</strong> A5 Booklet on A4 (Side-by-side)</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
    <script src="export.js"></script>
</body>
</html>
