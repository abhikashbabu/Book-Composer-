<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🖨️ Print Export - Book Composer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <h1>📚 Book Composer</h1>
        </div>
        <div class="navbar-menu">
            <a href="index.html" class="nav-link">🏠 Home</a>
            <a href="reader.html" class="nav-link">📖 Reader</a>
            <a href="export.html" class="nav-link active">🖨️ Print Export</a>
        </div>
        <button class="btn-theme" onclick="toggleTheme()">🌙</button>
    </nav>

    <main class="container export-container">
        <h2>🖨️ Print Export Settings</h2>
        <div class="export-grid">
            <div class="settings-panel">
                <h3>Export Configuration</h3>

                <div class="form-group">
                    <label for="paperSize">Paper Size</label>
                    <select id="paperSize" onchange="updatePreview()">
                        <option value="A4">A4 (210 × 297 mm)</option>
                        <option value="A5">A5 (148 × 210 mm)</option>
                        <option value="Letter">Letter (8.5" × 11")</option>
                        <option value="Legal">Legal (8.5" × 14")</option>
                        <option value="Custom">Custom Size</option>
                    </select>
                </div>

                <div class="form-group" id="customSizeGroup" style="display:none;">
                    <label for="customWidth">Width (mm)</label>
                    <input type="number" id="customWidth" value="210" onchange="updatePreview()">
                    <label for="customHeight" style="margin-top: 10px;">Height (mm)</label>
                    <input type="number" id="customHeight" value="297" onchange="updatePreview()">
                </div>

                <div class="form-group">
                    <label>
                        <input type="checkbox" id="duplex" checked onchange="updatePreview()">
                        Double-Sided Printing (Duplex)
                    </label>
                </div>

                <div class="form-group">
                    <label for="colorProfile">Color Profile</label>
                    <select id="colorProfile" onchange="updatePreview()">
                        <option value="RGB">RGB</option>
                        <option value="CMYK">CMYK</option>
                        <option value="Grayscale">Grayscale</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Margins (mm)</label>
                    <div class="margin-inputs">
                        <input type="number" id="marginTop" value="10" placeholder="Top" onchange="updatePreview()">
                        <input type="number" id="marginBottom" value="10" placeholder="Bottom" onchange="updatePreview()">
                        <input type="number" id="marginLeft" value="10" placeholder="Left" onchange="updatePreview()">
                        <input type="number" id="marginRight" value="10" placeholder="Right" onchange="updatePreview()">
                    </div>
                </div>

                <div class="form-group">
                    <label for="bindingMargin">Binding Margin (mm)</label>
                    <input type="number" id="bindingMargin" value="5" onchange="updatePreview()">
                </div>

                <div class="form-group">
                    <label>
                        <input type="checkbox" id="cropMarks" checked onchange="updatePreview()">
                        Include Crop Marks
                    </label>
                </div>

                <div class="form-group">
                    <label>
                        <input type="checkbox" id="bleedMarks" checked onchange="updatePreview()">
                        Include Bleed Marks
                    </label>
                </div>

                <button class="btn btn-primary btn-large" onclick="exportPDF()">📥 Export PDF</button>
            </div>

            <div class="preview-panel">
                <h3>📋 Live Preview</h3>
                <div class="preview-box">
                    <div class="preview-content" id="previewContent">
                        <h4 id="previewSize">A4 (210 × 297 mm)</h4>
                        <p><strong>Margins:</strong> <span id="previewMargins">10mm all sides</span></p>
                        <p><strong>Color Profile:</strong> <span id="previewColor">RGB</span></p>
                        <p><strong>Double-Sided:</strong> <span id="previewDuplex">Yes</span></p>
                        <p><strong>Binding Margin:</strong> <span id="previewBinding">5mm</span></p>
                        <p><strong>Crop Marks:</strong> <span id="previewCrop">Yes</span></p>
                        <p><strong>Bleed Marks:</strong> <span id="previewBleed">Yes</span></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Book Composer. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script src="export.js"></script>
</body>
</html>
